services:
  # ─── Next.js app ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "3022:3020"   # Direct access on same machine: http://localhost:3022
    volumes:
      - uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql://fieldiq:fieldiq@postgres:5432/fieldiq
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production-32chars!!}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NODE_ENV=production
      # Disable secure-only cookies so iOS devices on LAN can log in via Caddy's self-signed HTTPS
      - COOKIE_SECURE=false
      # Corporate SSL proxy fix — allows outbound HTTPS to api.anthropic.com
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fieldiq

  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5445:5432"
    environment:
      POSTGRES_USER: fieldiq
      POSTGRES_PASSWORD: fieldiq
      POSTGRES_DB: fieldiq
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fieldiq -d fieldiq"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - fieldiq

  # ─── Caddy (HTTPS for camera/mic on tablets over LAN) ───────────────────
  # Use https://<your-LAN-IP>:8443 from a tablet on the same network.
  # On your own laptop, use http://localhost:3020 instead (no Caddy needed).
  caddy:
    image: caddy:2-alpine
    ports:
      - "8082:80"     # HTTP (redirects to HTTPS)
      - "8444:443"    # HTTPS — access from tablet: https://<LAN-IP>:8444
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - fieldiq

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:

networks:
  fieldiq:
    driver: bridge
