<svg width="680" height="420" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
  <title>Field IQ Logo — L'Oréal Dermatology</title>

  <!-- Background card -->
  <rect x="60" y="30" width="560" height="360" rx="16" fill="#F9F8F5" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- Pin body -->
  <path d="M230 90 C190 90 158 122 158 162 C158 202 195 240 230 270 C265 240 302 202 302 162 C302 122 270 90 230 90 Z" fill="#1A1A1A"/>

  <!-- Inner gold circle -->
  <circle cx="230" cy="158" r="34" fill="#C8973A"/>

  <!-- Network dots -->
  <circle cx="230" cy="150" r="4.5" fill="#1A1A1A"/>
  <circle cx="213" cy="163" r="3.5" fill="#1A1A1A"/>
  <circle cx="247" cy="163" r="3.5" fill="#1A1A1A"/>
  <circle cx="220" cy="172" r="3" fill="#1A1A1A"/>
  <circle cx="240" cy="172" r="3" fill="#1A1A1A"/>

  <!-- Network edges -->
  <line x1="230" y1="150" x2="213" y2="163" stroke="#1A1A1A" stroke-width="1.5" opacity="0.6"/>
  <line x1="230" y1="150" x2="247" y2="163" stroke="#1A1A1A" stroke-width="1.5" opacity="0.6"/>
  <line x1="213" y1="163" x2="220" y2="172" stroke="#1A1A1A" stroke-width="1.5" opacity="0.6"/>
  <line x1="247" y1="163" x2="240" y2="172" stroke="#1A1A1A" stroke-width="1.5" opacity="0.6"/>
  <line x1="213" y1="163" x2="247" y2="163" stroke="#1A1A1A" stroke-width="1.2" opacity="0.4"/>

  <!-- Pin tip dot -->
  <circle cx="230" cy="274" r="6" fill="#C8973A"/>

  <!-- Wordmark -->
  <text x="322" y="196" font-family="Helvetica Neue, Arial, sans-serif" font-size="52" font-weight="500" fill="#1A1A1A" letter-spacing="-1">Field</text>
  <text x="444" y="196" font-family="Helvetica Neue, Arial, sans-serif" font-size="52" font-weight="500" fill="#C8973A" letter-spacing="-1"> IQ</text>

  <!-- Separator line -->
  <line x1="322" y1="210" x2="556" y2="210" stroke="#D3D1C7" stroke-width="0.5"/>

  <!-- Tagline -->
  <text x="322" y="232" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="400" fill="#888780" letter-spacing="2.5">SALES INTELLIGENCE</text>

  <!-- L'Oréal attribution -->
  <text x="322" y="258" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="500" fill="#888780" letter-spacing="3">BY L'ORÉAL</text>

  <!-- Bottom accent bar - gold section -->
  <path d="M60 362 L260 362 L260 390 L76 390 Q60 390 60 374 Z" fill="#C8973A"/>
  <!-- Bottom accent bar - dark section -->
  <path d="M260 362 L620 362 L620 374 Q620 390 604 390 L260 390 Z" fill="#1A1A1A"/>

  <!-- Bar labels -->
  <text x="130" y="380" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="500" fill="#1A1A1A" letter-spacing="1.5" text-anchor="middle">DERMATOLOGY</text>
  <text x="440" y="380" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="400" fill="rgba(255,255,255,0.7)" letter-spacing="2" text-anchor="middle">L'ORÉAL</text>
</svg>
