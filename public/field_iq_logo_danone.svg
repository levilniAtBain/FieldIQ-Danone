<svg width="440" height="320" viewBox="0 0 440 320" xmlns="http://www.w3.org/2000/svg">
  <title>Field IQ Logo — Danone Nutrition</title>

  <!-- Background card -->
  <rect x="16" y="16" width="408" height="274" rx="16" fill="#F4F7FC" stroke="#C8D8EE" stroke-width="0.5"/>

  <!-- Pin body -->
  <path d="M110 36 C78 36 52 62 52 94 C52 126 83 155 110 178 C137 155 168 126 168 94 C168 62 142 36 110 36 Z" fill="#0066CC"/>

  <!-- Inner white circle -->
  <circle cx="110" cy="91" r="28" fill="#FFFFFF"/>

  <!-- Network dots -->
  <circle cx="110" cy="84"  r="4"   fill="#0066CC"/>
  <circle cx="96"  cy="95"  r="3.5" fill="#0066CC"/>
  <circle cx="124" cy="95"  r="3.5" fill="#0066CC"/>
  <circle cx="103" cy="104" r="3"   fill="#0066CC"/>
  <circle cx="117" cy="104" r="3"   fill="#0066CC"/>

  <!-- Network edges -->
  <line x1="110" y1="84"  x2="96"  y2="95"  stroke="#0066CC" stroke-width="1.5" opacity="0.5"/>
  <line x1="110" y1="84"  x2="124" y2="95"  stroke="#0066CC" stroke-width="1.5" opacity="0.5"/>
  <line x1="96"  y1="95"  x2="103" y2="104" stroke="#0066CC" stroke-width="1.5" opacity="0.5"/>
  <line x1="124" y1="95"  x2="117" y2="104" stroke="#0066CC" stroke-width="1.5" opacity="0.5"/>
  <line x1="96"  y1="95"  x2="124" y2="95"  stroke="#0066CC" stroke-width="1.2" opacity="0.3"/>

  <!-- Pin tip dot -->
  <circle cx="110" cy="181" r="5" fill="#0066CC"/>

  <!-- Wordmark -->
  <text x="192" y="126" font-family="Helvetica Neue, Arial, sans-serif" font-size="48" font-weight="500" fill="#1A1A1A" letter-spacing="-1">Field</text>
  <text x="306" y="126" font-family="Helvetica Neue, Arial, sans-serif" font-size="48" font-weight="500" fill="#0066CC" letter-spacing="-1"> IQ</text>

  <!-- Separator -->
  <line x1="192" y1="140" x2="404" y2="140" stroke="#C8D8EE" stroke-width="0.5"/>

  <!-- Tagline -->
  <text x="192" y="160" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="400" fill="#888780" letter-spacing="2.5">SALES INTELLIGENCE</text>

  <!-- Danone attribution -->
  <text x="192" y="182" font-family="Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="500" fill="#888780" letter-spacing="3">BY DANONE</text>

  <!-- Bottom bar — bleu -->
  <path d="M16 262 L196 262 L196 290 L32 290 Q16 290 16 276 Z" fill="#0066CC"/>
  <!-- Bottom bar — dark -->
  <path d="M196 262 L424 262 L424 276 Q424 290 408 290 L196 290 Z" fill="#1A1A1A"/>

  <!-- Bar labels -->
  <text x="105" y="281" font-family="Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="500" fill="#FFFFFF" letter-spacing="2" text-anchor="middle">NUTRITION</text>
  <text x="310" y="281" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.75)" letter-spacing="2.5" text-anchor="middle">DANONE</text>

</svg>
